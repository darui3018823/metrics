name: GitHub Metrics

on:
  schedule:
    - cron: "0 15 * * 0"
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: darui3018823/metrics@master
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: darui3018823
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Tokyo

          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_ignored: C, C++, Makefile, CMake, GLSL, HLSL, ShaderLab
          plugin_languages_limit: 8
          plugin_languages_aliases: "tsx:TypeScript"
          plugin_languages_colors: "go:#00ADD8, powershell:#012456, c#:#178600"
          plugin_languages_analysis_timeout: 30
          plugin_languages_analysis_timeout_repositories: 15

          repositories_skipped: |
            @use.patterns
            -*/*
            +darui3018823/*
            -darui3018823/swicthbot_discordbot
            -darui3018823/Auto_Reply
            -darui3018823/stable-diffusion
            -darui3018823/skport-flows
